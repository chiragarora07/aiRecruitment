<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#09090B;
  --orb-op:0.38;
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.1);
  --text-h:#f1f5f9;
  --text-b:#94a3b8;
  --text-m:#64748b;
  --text-link:#a78bfa;
  --input-bg:rgba(255,255,255,0.05);
  --input-border:rgba(255,255,255,0.12);
  --input-color:#e2e8f0;
  --input-ph:#64748b;
  --tab-bg:rgba(255,255,255,0.05);
  --tab-border:rgba(255,255,255,0.08);
  --tab-active:#c4b5fd;
  --tab-inactive:#64748b;
  --role-bg:rgba(255,255,255,0.03);
  --role-border:rgba(255,255,255,0.08);
  --role-icon-bg:rgba(255,255,255,0.08);
  --role-title:#94a3b8;
  --role-active-bg:rgba(109,40,217,0.12);
  --role-active-icon:rgba(109,40,217,0.3);
  --role-active-title:#c4b5fd;
  --divider:rgba(255,255,255,0.08);
  --divider-text:#475569;
  --sso-bg:rgba(255,255,255,0.04);
  --sso-border:rgba(255,255,255,0.1);
  --sso-color:#64748b;
  --toggle-bg:rgba(255,255,255,0.08);
  --toggle-border:rgba(255,255,255,0.15);
  --toggle-color:#c4b5fd;
  --label-up:#a78bfa;
  --badge-bg:rgba(124,58,237,0.15);
  --badge-border:rgba(124,58,237,0.3);
  --badge-color:#c4b5fd;
  --tagline:#64748b;
  --logo-color:#f1f5f9;
  --forgot-color:#a78bfa;
  --role-desc:#64748b;
  --shadow:0 32px 80px rgba(0,0,0,0.7);
}

.light-mode{
  --bg:#f0f4ff;
  --orb-op:0.12;
  --card-bg:rgba(255,255,255,0.88);
  --card-border:rgba(99,60,219,0.12);
  --text-h:#0f172a;
  --text-b:#334155;
  --text-m:#64748b;
  --text-link:#5b21b6;
  --input-bg:#fff;
  --input-border:rgba(0,0,0,0.12);
  --input-color:#0f172a;
  --input-ph:#94a3b8;
  --tab-bg:rgba(0,0,0,0.05);
  --tab-border:rgba(0,0,0,0.08);
  --tab-active:#5b21b6;
  --tab-inactive:#64748b;
  --role-bg:rgba(255,255,255,0.8);
  --role-border:rgba(0,0,0,0.09);
  --role-icon-bg:rgba(0,0,0,0.05);
  --role-title:#475569;
  --role-active-bg:rgba(109,40,217,0.07);
  --role-active-icon:rgba(109,40,217,0.15);
  --role-active-title:#5b21b6;
  --divider:rgba(0,0,0,0.08);
  --divider-text:#94a3b8;
  --sso-bg:rgba(255,255,255,0.9);
  --sso-border:rgba(0,0,0,0.1);
  --sso-color:#475569;
  --toggle-bg:rgba(255,255,255,0.9);
  --toggle-border:rgba(109,40,217,0.25);
  --toggle-color:#5b21b6;
  --label-up:#6d28d9;
  --badge-bg:rgba(109,40,217,0.08);
  --badge-border:rgba(109,40,217,0.2);
  --badge-color:#5b21b6;
  --tagline:#7c3aed;
  --logo-color:#0f172a;
  --forgot-color:#5b21b6;
  --role-desc:#94a3b8;
  --shadow:0 16px 60px rgba(109,40,217,0.1),0 4px 24px rgba(0,0,0,0.08);
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  transition:background 0.3s;
  min-height:100vh;
}

.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  padding:clamp(1rem,4vw,2.5rem) clamp(0.75rem,3vw,2rem);
}

/* Orbs */
.orb{position:absolute;border-radius:50%;pointer-events:none;transition:opacity 0.3s;}
.orb-1{width:clamp(200px,50vw,500px);height:clamp(200px,50vw,500px);background:radial-gradient(circle,#3730a3,transparent 70%);top:-15%;left:-10%;opacity:var(--orb-op);}
.orb-2{width:clamp(150px,35vw,350px);height:clamp(150px,35vw,350px);background:radial-gradient(circle,#6d28d9,transparent 70%);top:10%;right:-8%;opacity:var(--orb-op);}
.orb-3{width:clamp(100px,22vw,250px);height:clamp(100px,22vw,250px);background:radial-gradient(circle,#4338ca,transparent 70%);bottom:5%;left:5%;opacity:calc(var(--orb-op)*0.8);}
.ambient{position:absolute;width:clamp(280px,60vw,560px);height:clamp(120px,25vw,280px);background:radial-gradient(ellipse,rgba(109,40,217,0.15) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-55%);pointer-events:none;}

/* Theme toggle */
.theme-toggle{
  position:fixed;
  top:clamp(10px,2vw,20px);
  right:clamp(10px,2vw,20px);
  z-index:999;
  width:clamp(36px,5vw,42px);
  height:clamp(36px,5vw,42px);
  border-radius:12px;
  background:var(--toggle-bg);
  border:1.5px solid var(--toggle-border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all 0.25s;
  color:var(--toggle-color);
  font-size:clamp(16px,2.5vw,20px);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.theme-toggle:hover{
  background:rgba(109,40,217,0.2);
  border-color:rgba(109,40,217,0.5);
  transform:scale(1.08);
  box-shadow:0 0 0 4px rgba(109,40,217,0.12),0 4px 16px rgba(0,0,0,0.2);
}
.theme-toggle i{font-size:inherit;line-height:1;}

/* Card */
.card{
  position:relative;
  width:100%;
  max-width:clamp(320px,90vw,440px);
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:clamp(14px,3vw,22px);
  padding:clamp(1.25rem,4vw,2rem) clamp(1rem,4vw,1.75rem) clamp(1.5rem,4vw,2.25rem);
  backdrop-filter:blur(32px);
  -webkit-backdrop-filter:blur(32px);
  box-shadow:var(--shadow);
  z-index:10;
  transition:background 0.3s,border-color 0.3s,box-shadow 0.3s;
}

/* Logo */
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.logo-mark{
  width:clamp(28px,4vw,34px);
  height:clamp(28px,4vw,34px);
  background:linear-gradient(135deg,#6d28d9,#4338ca);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-mark svg{width:60%;height:60%;}
.logo-name{font-size:clamp(14px,2.5vw,17px);font-weight:700;color:var(--logo-color);letter-spacing:-0.02em;transition:color 0.3s;}
.logo-badge{
  font-size:clamp(9px,1.5vw,11px);font-weight:600;
  color:var(--badge-color);
  background:var(--badge-bg);
  border:1px solid var(--badge-border);
  padding:2px 7px;border-radius:5px;
  letter-spacing:0.06em;
  transition:all 0.3s;
}
.tagline{font-size:clamp(10px,1.8vw,12px);color:var(--tagline);margin-bottom:clamp(0.8rem,2.5vw,1.25rem);font-style:italic;letter-spacing:0.025em;transition:color 0.3s;}

.headline{font-size:clamp(16px,3.5vw,21px);font-weight:700;color:var(--text-h);margin-bottom:3px;letter-spacing:-0.025em;transition:color 0.3s;}
.sub{font-size:clamp(11px,2vw,13px);color:var(--text-b);margin-bottom:clamp(1rem,3vw,1.4rem);min-height:16px;line-height:1.5;transition:color 0.3s;}

/* Tabs */
.tab-wrap{
  background:var(--tab-bg);
  border:1px solid var(--tab-border);
  border-radius:11px;padding:3px;
  display:flex;gap:2px;
  margin-bottom:clamp(1rem,3vw,1.4rem);
  position:relative;
  transition:background 0.3s,border-color 0.3s;
}
.tab-slider{
  position:absolute;top:3px;bottom:3px;
  width:calc(50% - 3px);
  background:rgba(109,40,217,0.22);
  border:1px solid rgba(109,40,217,0.45);
  border-radius:8px;
  transition:left 0.28s cubic-bezier(.4,0,.2,1);
  left:3px;
}
.tab-slider.right{left:calc(50% + 1px);}
.tab-btn{
  flex:1;padding:clamp(6px,1.5vw,8px);
  font-size:clamp(11px,2vw,13px);font-weight:500;
  border:none;background:transparent;cursor:pointer;
  border-radius:8px;position:relative;z-index:2;
  transition:color 0.2s;font-family:'Inter',sans-serif;
}
.tab-btn.active{color:var(--tab-active);}
.tab-btn:not(.active){color:var(--tab-inactive);}

/* Role */
.role-label{font-size:clamp(9px,1.6vw,11px);font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:8px;transition:color 0.3s;}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(4px,1.5vw,8px);margin-bottom:clamp(1rem,3vw,1.3rem);}
.role-card{
  border:1px solid var(--role-border);
  border-radius:clamp(8px,1.5vw,11px);
  padding:clamp(8px,2vw,11px) clamp(4px,1vw,8px) clamp(6px,1.5vw,9px);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;
  background:var(--role-bg);
  transition:transform 0.18s cubic-bezier(.4,0,.2,1),border-color 0.18s,background 0.18s,box-shadow 0.18s;
}
.role-card:hover{transform:translateY(-2px);border-color:rgba(109,40,217,0.35);background:var(--role-active-bg);}
.role-card.active{
  border-color:transparent;
  background:var(--role-active-bg);
  transform:scale(1.04);
  box-shadow:0 0 0 1.5px #7c3aed,0 0 20px rgba(109,40,217,0.2);
}
.role-icon{
  width:clamp(24px,3.5vw,30px);height:clamp(24px,3.5vw,30px);
  border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-size:clamp(12px,2vw,15px);
  background:var(--role-icon-bg);
  transition:background 0.18s;
}
.role-card.active .role-icon{background:var(--role-active-icon);}
.role-title{font-size:clamp(9.5px,1.7vw,11px);font-weight:500;color:var(--role-title);text-align:center;line-height:1.2;transition:color 0.18s;}
.role-card.active .role-title{color:var(--role-active-title);}
.role-desc{font-size:clamp(8px,1.3vw,9.5px);color:var(--role-desc);text-align:center;line-height:1.3;display:none;transition:color 0.3s;}
.role-card.active .role-desc{display:block;}

/* Fields */
.fields{display:flex;flex-direction:column;gap:clamp(8px,1.5vw,11px);margin-bottom:clamp(6px,1.5vw,10px);}
.field-wrap{position:relative;}
.field-wrap input{
  width:100%;
  background:var(--input-bg);
  border:1px solid var(--input-border);
  border-radius:10px;
  padding:clamp(12px,2.5vw,14px) 14px clamp(4px,1vw,6px);
  font-size:clamp(12px,2vw,13.5px);
  color:var(--input-color);
  font-family:'Inter',sans-serif;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s,background 0.3s,color 0.3s;
}
.field-wrap input::placeholder{color:transparent;}
.field-wrap input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.15);}
.field-wrap label{
  position:absolute;
  left:14px;top:50%;transform:translateY(-50%);
  font-size:clamp(11px,2vw,13px);
  color:var(--input-ph);
  pointer-events:none;
  transition:top 0.18s,font-size 0.18s,color 0.18s,transform 0.18s;
}
.field-wrap input:focus~label,
.field-wrap input:not(:placeholder-shown)~label{
  top:7px;transform:translateY(0);
  font-size:clamp(9px,1.5vw,10.5px);
  color:var(--label-up);
}

.forgot{
  display:block;text-align:right;
  font-size:clamp(11px,1.8vw,12.5px);
  color:var(--forgot-color);
  margin-bottom:clamp(0.8rem,2.5vw,1rem);
  text-decoration:none;cursor:pointer;
  transition:opacity 0.15s,color 0.3s;
}
.forgot:hover{opacity:0.7;}

.cta{
  width:100%;
  padding:clamp(10px,2.5vw,13px);
  background:linear-gradient(135deg,#6d28d9 0%,#4338ca 100%);
  border:none;border-radius:10px;
  color:#fff;
  font-size:clamp(12px,2vw,14px);
  font-weight:600;
  font-family:'Inter',sans-serif;
  cursor:pointer;letter-spacing:0.01em;
  transition:opacity 0.2s,transform 0.15s,box-shadow 0.2s;
  box-shadow:0 4px 20px rgba(109,40,217,0.4);
  margin-bottom:clamp(0.9rem,2.5vw,1.25rem);
}
.cta:hover{opacity:0.88;transform:translateY(-1px);box-shadow:0 8px 30px rgba(109,40,217,0.55);}
.cta:active{transform:translateY(0);}

.divider{display:flex;align-items:center;gap:10px;margin-bottom:clamp(0.8rem,2.5vw,1rem);}
.divider-line{flex:1;height:1px;background:var(--divider);transition:background 0.3s;}
.divider span{font-size:clamp(10px,1.6vw,11.5px);color:var(--divider-text);white-space:nowrap;transition:color 0.3s;}

.sso-row{display:grid;grid-template-columns:1fr 1fr;gap:clamp(6px,1.5vw,9px);}
.sso-btn{
  padding:clamp(8px,1.8vw,10px) 8px;
  border-radius:9px;
  border:1px solid var(--sso-border);
  background:var(--sso-bg);
  color:var(--sso-color);
  font-size:clamp(10px,1.8vw,12.5px);
  font-weight:500;
  font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;
  transition:all 0.2s;
}
.sso-btn:hover{border-color:rgba(109,40,217,0.35);background:rgba(109,40,217,0.07);color:#a78bfa;}
.sso-btn i{font-size:clamp(12px,2vw,15px);}

.slide-in{animation:slideIn 0.22s cubic-bezier(.4,0,.2,1);}
@keyframes slideIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.hidden{display:none!important;}

@media(max-width:380px){
  .role-desc{display:none!important;}
  .sso-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme">
  <i class="ti ti-moon" id="themeIcon"></i>
</button>

<div class="page" id="page">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="ambient"></div>

  <div class="card">
    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="3.5" r="2" fill="white" opacity="0.95"/>
          <circle cx="2.5" cy="12.5" r="1.5" fill="white" opacity="0.75"/>
          <circle cx="13.5" cy="12.5" r="1.5" fill="white" opacity="0.75"/>
          <circle cx="8" cy="8.5" r="1" fill="white" opacity="0.55"/>
          <line x1="8" y1="3.5" x2="2.5" y2="12.5" stroke="white" stroke-width="0.75" opacity="0.3"/>
          <line x1="8" y1="3.5" x2="13.5" y2="12.5" stroke="white" stroke-width="0.75" opacity="0.3"/>
          <line x1="8" y1="3.5" x2="8" y2="8.5" stroke="white" stroke-width="0.75" opacity="0.3"/>
          <line x1="2.5" y1="12.5" x2="13.5" y2="12.5" stroke="white" stroke-width="0.75" opacity="0.3"/>
        </svg>
      </div>
      <span class="logo-name">HireFlow</span>
      <span class="logo-badge">AI</span>
    </div>
    <p class="tagline">Recruit Smarter. Decide Faster.</p>

    <p class="headline" id="headlineText">Welcome back</p>
    <p class="sub" id="subText">Sign in to accelerate your talent pipeline</p>

    <div class="tab-wrap">
      <div class="tab-slider" id="tabSlider"></div>
      <button class="tab-btn active" id="tabSignin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <p class="role-label">Select your role</p>
    <div class="role-grid">
      <div class="role-card active" onclick="selectRole(this,'applicant')">
        <div class="role-icon">🎓</div>
        <div class="role-title">Applicant</div>
        <div class="role-desc">Track screening</div>
      </div>
      <div class="role-card" onclick="selectRole(this,'interviewer')">
        <div class="role-icon">🧑‍💼</div>
        <div class="role-title">Interviewer</div>
        <div class="role-desc">Score candidates</div>
      </div>
      <div class="role-card" onclick="selectRole(this,'admin')">
        <div class="role-icon">⚙️</div>
        <div class="role-title">Admin</div>
        <div class="role-desc">Manage drives</div>
      </div>
    </div>

    <div class="fields">
      <div id="signupNameField" class="hidden">
        <div class="field-wrap" style="margin-bottom:0">
          <input type="text" id="fname" placeholder="x" autocomplete="name">
          <label for="fname">Full Name</label>
        </div>
      </div>
      <div class="field-wrap">
        <input type="email" id="email" placeholder="x" autocomplete="email">
        <label for="email">Email address</label>
      </div>
      <div class="field-wrap">
        <input type="password" id="password" placeholder="x" autocomplete="current-password">
        <label for="password">Password</label>
      </div>
      <div id="signupConfirmField" class="hidden">
        <div class="field-wrap" style="margin-bottom:0">
          <input type="password" id="confirm" placeholder="x" autocomplete="new-password">
          <label for="confirm">Confirm password</label>
        </div>
      </div>
    </div>

    <a class="forgot" id="forgotLink">Forgot password?</a>

    <button class="cta" id="ctaBtn">Sign In →</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span>or continue with</span>
      <div class="divider-line"></div>
    </div>

    <div class="sso-row">
      <button class="sso-btn">
        <i class="ti ti-building" aria-hidden="true"></i>
        Institute ID
      </button>
      <button class="sso-btn">
        <i class="ti ti-fingerprint" aria-hidden="true"></i>
        SSO Login
      </button>
    </div>
  </div>
</div>

<script>
let isDark = true;
let currentTab = 'signin';
let currentRole = 'applicant';

const roleSubs = {
  applicant:{signin:'Track your drives & AI screening status',signup:'Join as a candidate and get discovered'},
  interviewer:{signin:'Evaluate candidates and submit scorecards',signup:'Join as an interviewer on HireFlow'},
  admin:{signin:'Configure drives & manage your pipeline',signup:'Set up your organisation on HireFlow'}
};

function toggleTheme(){
  isDark = !isDark;
  const page = document.getElementById('page');
  const icon = document.getElementById('themeIcon');
  if(isDark){
    page.classList.remove('light-mode');
    document.body.classList.remove('light-mode');
    icon.className = 'ti ti-moon';
  } else {
    page.classList.add('light-mode');
    document.body.classList.add('light-mode');
    icon.className = 'ti ti-sun';
  }
}

function switchTab(tab){
  currentTab = tab;
  const slider = document.getElementById('tabSlider');
  const si = document.getElementById('tabSignin');
  const su = document.getElementById('tabSignup');
  const nf = document.getElementById('signupNameField');
  const cf = document.getElementById('signupConfirmField');

  if(tab==='signin'){
    slider.classList.remove('right');
    si.classList.add('active'); su.classList.remove('active');
    document.getElementById('headlineText').textContent='Welcome back';
    document.getElementById('ctaBtn').textContent='Sign In →';
    document.getElementById('forgotLink').classList.remove('hidden');
    nf.classList.add('hidden'); cf.classList.add('hidden');
  } else {
    slider.classList.add('right');
    su.classList.add('active'); si.classList.remove('active');
    document.getElementById('headlineText').textContent='Create your account';
    document.getElementById('ctaBtn').textContent='Get Started →';
    document.getElementById('forgotLink').classList.add('hidden');
    nf.classList.remove('hidden'); nf.classList.add('slide-in');
    cf.classList.remove('hidden'); cf.classList.add('slide-in');
  }
  document.getElementById('subText').textContent = roleSubs[currentRole][tab];
}

function selectRole(el, role){
  currentRole = role;
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('subText').textContent = roleSubs[role][currentTab];
}
</script>
</body>
</html>
