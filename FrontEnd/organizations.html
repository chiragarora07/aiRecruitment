<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizations — HireFlow</title>
  <meta name="description" content="Browse every organization recruiting on HireFlow. Tap any org to see its profile and active recruitment drives." />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

    /* ── Design Tokens (matched to HireFlow landing) ── */
    :root {
      --bg:        #0A0F1E;
      --bg2:       #0D1426;
      --surface:   #111827;
      --surface2:  #1a2235;
      --border:    rgba(255,255,255,0.08);
      --blue:      #3B82F6;
      --blue-dark: #2563EB;
      --blue-glow: rgba(59,130,246,0.18);
      --cyan:      #06B6D4;
      --text:      #F1F5F9;
      --muted:     #94A3B8;
      --muted2:    #64748B;
      --white:     #FFFFFF;
      --red:       #EF4444;
      --green:     #22C55E;
      --amber:     #F59E0B;
      --ff-head:   'Space Grotesk', sans-serif;
      --ff-body:   'Inter', sans-serif;
      --radius:    12px;
      --radius-lg: 20px;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-body);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .container { max-width: 1160px; margin: 0 auto; padding: 0 24px; }
    h1,h2,h3,h4 { font-family: var(--ff-head); font-weight: 700; line-height: 1.15; }
    p { color: var(--muted); line-height: 1.7; }
    a { color: inherit; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 22px;
      border-radius: var(--radius);
      font-family: var(--ff-body);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 0 24px rgba(59,130,246,0.3);
    }
    .btn-primary:hover { background: var(--blue-dark); box-shadow: 0 0 36px rgba(59,130,246,0.5); transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.04); }
    .btn-sm { padding: 8px 16px; font-size: 0.82rem; }

    /* ══════════════════════════════════════
       NAV (matches landing page)
    ══════════════════════════════════════ */
    #navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,15,30,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
    }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .nav-logo {
      display: flex; align-items: center; gap: 9px;
      font-family: var(--ff-head); font-size: 1.2rem; font-weight: 700;
      color: var(--white); text-decoration: none; flex-shrink: 0;
    }
    .nav-right { display: flex; align-items: center; gap: 10px; }

    /* ══════════════════════════════════════
       PAGE HEAD
    ══════════════════════════════════════ */
    .page-head {
      padding: 56px 0 32px;
      background:
        radial-gradient(ellipse 70% 50% at 50% -20%, rgba(59,130,246,0.14) 0%, transparent 60%);
      border-bottom: 1px solid var(--border);
    }
    .section-label {
      display: inline-block;
      font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--blue); background: var(--blue-glow);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 100px; padding: 5px 14px; margin-bottom: 16px;
    }
    .page-head h1 { font-size: clamp(1.9rem, 4vw, 2.6rem); margin-bottom: 10px; }
    .page-head p { max-width: 560px; font-size: 1rem; }

    /* Search + filter bar */
    .filter-bar {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-top: 28px;
    }
    .search-wrap {
      position: relative; flex: 1; min-width: 240px;
    }
    .search-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted2); pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 16px 11px 40px;
      color: var(--text);
      font-family: var(--ff-body);
      font-size: 0.92rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .search-input:focus { border-color: var(--blue); }
    .search-input::placeholder { color: var(--muted2); }

    .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      padding: 9px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .chip:hover { border-color: rgba(59,130,246,0.3); color: var(--text); }
    .chip.active { background: var(--blue-glow); border-color: rgba(59,130,246,0.4); color: var(--blue); }

    /* ══════════════════════════════════════
       ORG LIST
    ══════════════════════════════════════ */
    .org-section { padding: 36px 0 100px; }
    .org-list { display: flex; flex-direction: column; gap: 14px; }

    .org-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color var(--transition);
    }
    .org-item.open { border-color: rgba(59,130,246,0.35); }

    .org-row {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 22px;
      cursor: pointer;
      user-select: none;
      transition: background var(--transition);
    }
    .org-row:hover { background: rgba(255,255,255,0.02); }

    .org-logo {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-head); font-weight: 700; font-size: 1.05rem;
      color: #fff; flex-shrink: 0;
    }
    .org-main { flex: 1; min-width: 0; }
    .org-name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .org-name { font-family: var(--ff-head); font-size: 1.05rem; font-weight: 700; color: var(--text); }
    .org-tagline { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    .org-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .tag {
      font-size: 0.7rem; font-weight: 600;
      padding: 3px 10px; border-radius: 100px;
      background: rgba(255,255,255,0.05);
      color: var(--muted2);
      border: 1px solid var(--border);
    }

    .org-meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
      flex-shrink: 0;
    }
    .drive-count {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; font-weight: 600; color: var(--green);
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.25);
      padding: 4px 11px; border-radius: 100px;
    }
    .drive-count.none { color: var(--muted2); background: rgba(255,255,255,0.04); border-color: var(--border); }
    .drive-count .pulse {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(.7);} }

    .chevron {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      transition: transform var(--transition), background var(--transition);
      flex-shrink: 0;
    }
    .org-item.open .chevron { transform: rotate(180deg); background: var(--blue-glow); border-color: rgba(59,130,246,0.3); }
    .chevron svg { color: var(--muted); }
    .org-item.open .chevron svg { color: var(--blue); }

    /* ── Accordion panel ── */
    .org-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .org-panel-inner {
      padding: 4px 22px 26px;
      border-top: 1px solid var(--border);
    }

    .org-detail-grid {
      display: grid; grid-template-columns: 1fr 1.6fr; gap: 28px;
      padding-top: 20px;
    }

    .org-about h4 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted2); margin-bottom: 10px; font-weight: 600; }
    .org-about p { font-size: 0.88rem; margin-bottom: 16px; }
    .org-social { display: flex; gap: 8px; }
    .social-pill {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--muted); transition: all var(--transition);
    }
    .social-pill:hover { border-color: rgba(59,130,246,0.3); color: var(--blue); }

    .drives-col h4 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted2); margin-bottom: 12px; font-weight: 600; }
    .drive-list { display: flex; flex-direction: column; gap: 10px; }

    .drive-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      transition: border-color var(--transition);
    }
    .drive-card:hover { border-color: rgba(59,130,246,0.25); }
    .drive-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .drive-role { font-family: var(--ff-head); font-weight: 700; font-size: 0.95rem; color: var(--text); }
    .drive-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; }
    .drive-deadline {
      font-size: 0.72rem; font-weight: 600;
      padding: 3px 10px; border-radius: 100px; white-space: nowrap;
    }
    .deadline-open { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .deadline-soon { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }
    .deadline-closed { background: rgba(255,255,255,0.05); color: var(--muted2); border: 1px solid var(--border); }

    .weight-row { display: flex; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
    .weight-chip { font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .weight-chip b { color: var(--text); font-family: var(--ff-head); }
    .weight-dot { width: 6px; height: 6px; border-radius: 50%; }

    .drive-bottom { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .drive-bottom .meta-txt { font-size: 0.76rem; color: var(--muted2); }

    .no-drives {
      padding: 24px; text-align: center;
      background: var(--surface2); border: 1px dashed var(--border);
      border-radius: 10px; color: var(--muted2); font-size: 0.85rem;
    }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted2);
    }
    .empty-state svg { margin-bottom: 16px; opacity: 0.5; }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 720px) {
      .org-detail-grid { grid-template-columns: 1fr; gap: 18px; }
      .org-row { padding: 16px; gap: 12px; }
      .org-logo { width: 42px; height: 42px; font-size: 0.95rem; }
      .org-meta { align-items: flex-start; }
      .drive-top { flex-direction: column; }
    }
    @media (max-width: 480px) {
      .nav-links-desktop { display: none; }
      .org-name-row { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>

<!-- ══ NAV ══ -->
<header id="navbar">
  <div class="container">
    <nav class="nav-inner">
      <a href="hireflow.html" class="nav-logo" aria-label="HireFlow home">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="7" fill="#3B82F6"/>
          <path d="M7 10h14M7 14h9M7 18h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="21" cy="18" r="4" fill="#0A0F1E" stroke="#06B6D4" stroke-width="1.5"/>
          <path d="M19.5 18l1 1 1.5-1.5" stroke="#06B6D4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        HireFlow
      </a>
      <div class="nav-right">
        <a href="#" class="btn btn-ghost btn-sm">Log In</a>
        <a href="#" class="btn btn-primary btn-sm">Register</a>
      </div>
    </nav>
  </div>
</header>

<main>
  <!-- ══ PAGE HEAD ══ -->
  <section class="page-head">
    <div class="container">
      <div class="section-label">Organizations</div>
      <h1>Find who's hiring right now</h1>
      <p>Every org and club recruiting on HireFlow, in one place. Tap any organization to see its profile and open drives — no need to leave this page.</p>

      <div class="filter-bar">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.6"/><path d="M14 14l-3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <input type="text" class="search-input" id="orgSearch" placeholder="Search organizations..." aria-label="Search organizations" />
        </div>
        <div class="chip-row" id="chipRow" role="group" aria-label="Filter by domain">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="tech">Tech</button>
          <button class="chip" data-filter="design">Design</button>
          <button class="chip" data-filter="business">Business</button>
          <button class="chip" data-filter="open">Open Drives Only</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ══ ORG LIST ══ -->
  <section class="org-section">
    <div class="container">
      <div class="org-list" id="orgList"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true"><circle cx="18" cy="18" r="12" stroke="#64748B" stroke-width="2"/><path d="M34 34l-7-7" stroke="#64748B" stroke-width="2" stroke-linecap="round"/></svg>
        <p>No organizations match your search.</p>
      </div>
    </div>
  </section>
</main>

<script>
  /* ══ DATA ══ */
  const orgs = [
    {
      id: 'gdsc',
      name: 'Google Developer Student Clubs',
      short: 'GDSC',
      tagline: 'Tech community for student developers',
      domains: ['tech'],
      logoBg: 'linear-gradient(135deg,#3B82F6,#2563EB)',
      about: 'A campus-led developer community focused on building real projects with Google technologies — from Android to AI. We run workshops, hackathons, and a yearly recruitment drive for core team positions.',
      social: ['globe', 'linkedin', 'instagram'],
      drives: [
        {
          role: 'Technical Core Team — Web & ML',
          desc: 'Looking for 2nd/3rd year students with web dev or ML project experience to join the core organizing team.',
          deadline: '2026-07-15',
          status: 'open',
          weights: [['CV', 20, '#3B82F6'], ['AI Round', 40, '#06B6D4'], ['PI Round', 40, '#22C55E']],
          applicants: 86
        },
        {
          role: 'Design & Content Lead',
          desc: 'Own visual design and content strategy for events, social media, and workshop materials.',
          deadline: '2026-07-20',
          status: 'open',
          weights: [['CV', 30, '#3B82F6'], ['AI Round', 30, '#06B6D4'], ['PI Round', 40, '#22C55E']],
          applicants: 41
        }
      ]
    },
    {
      id: 'ace',
      name: 'Association of Computer Engineers',
      short: 'ACE',
      tagline: "The department's flagship technical society",
      domains: ['tech'],
      logoBg: 'linear-gradient(135deg,#06B6D4,#0891B2)',
      about: 'ACE runs the department\u2019s biggest technical events of the year, including coding contests, speaker sessions, and the annual tech fest. We recruit a new executive body every year.',
      social: ['globe', 'linkedin'],
      drives: [
        {
          role: 'Executive Body — All Domains',
          desc: 'Open recruitment for Tech, Logistics, Sponsorship, and Media wings of the executive body.',
          deadline: '2026-07-10',
          status: 'soon',
          weights: [['CV', 25, '#3B82F6'], ['AI Round', 35, '#06B6D4'], ['PI Round', 40, '#22C55E']],
          applicants: 212
        }
      ]
    },
    {
      id: 'design-cell',
      name: 'Design Cell',
      short: 'DC',
      tagline: 'Visual design & branding collective',
      domains: ['design'],
      logoBg: 'linear-gradient(135deg,#A855F7,#7C3AED)',
      about: 'A small, selective design collective handling branding for every major fest and society on campus. We care more about your portfolio than your resume.',
      social: ['instagram', 'globe'],
      drives: []
    },
    {
      id: 'finquest',
      name: 'FinQuest Club',
      short: 'FQ',
      tagline: 'Finance, markets & case competitions',
      domains: ['business'],
      logoBg: 'linear-gradient(135deg,#22C55E,#16A34A)',
      about: 'FinQuest trains students for case competitions, equity research challenges, and campus placements in consulting and finance roles.',
      social: ['linkedin', 'globe'],
      drives: [
        {
          role: 'Research & Analytics Associate',
          desc: 'Support market research and case-prep content for upcoming inter-college competitions.',
          deadline: '2026-08-02',
          status: 'open',
          weights: [['CV', 35, '#3B82F6'], ['AI Round', 25, '#06B6D4'], ['PI Round', 40, '#22C55E']],
          applicants: 58
        }
      ]
    },
    {
      id: 'roboclub',
      name: 'Robotics Club',
      short: 'RC',
      tagline: 'Robotics, automation & embedded systems',
      domains: ['tech'],
      logoBg: 'linear-gradient(135deg,#F59E0B,#D97706)',
      about: 'Building autonomous bots for inter-college competitions year-round. Recruitment closed for this cycle — check back next semester.',
      social: ['globe'],
      drives: []
    }
  ];

  /* ══ ICONS ══ */
  const socialIcons = {
    globe: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 8h13M8 1.5c2 2 2 11 0 13M8 1.5c-2 2-2 11 0 13" stroke="currentColor" stroke-width="1.2"/></svg>',
    linkedin: '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3.2 5.5H1V15h2.2V5.5zM2.1 4.5a1.3 1.3 0 100-2.6 1.3 1.3 0 000 2.6zM15 15h-2.2v-4.6c0-.8-.6-1.4-1.4-1.4s-1.4.6-1.4 1.4V15H7.8V5.5H10v1.2a3 3 0 012.4-1.3c1.8 0 2.6 1.2 2.6 3V15z"/></svg>',
    instagram: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="1.5" width="13" height="13" rx="3.5" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3"/><circle cx="11.8" cy="4.2" r="0.9" fill="currentColor"/></svg>'
  };

  function fmtDeadline(d) {
    const date = new Date(d + 'T00:00:00');
    return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }
  function daysLeft(d) {
    const diff = Math.ceil((new Date(d + 'T00:00:00') - new Date()) / 86400000);
    return diff;
  }
  function statusBadge(status, deadline) {
    if (status === 'closed') return '<span class="drive-deadline deadline-closed">Closed</span>';
    const days = daysLeft(deadline);
    if (status === 'soon' || days <= 5) return `<span class="drive-deadline deadline-soon">Closes in ${days}d</span>`;
    return `<span class="drive-deadline deadline-open">Closes in ${days}d</span>`;
  }

  function driveCardHTML(drive) {
    const weightsHTML = drive.weights.map(([label, pct, color]) =>
      `<span class="weight-chip"><span class="weight-dot" style="background:${color}"></span>${label} <b>${pct}%</b></span>`
    ).join('');
    return `
      <div class="drive-card">
        <div class="drive-top">
          <div class="drive-role">${drive.role}</div>
          ${statusBadge(drive.status, drive.deadline)}
        </div>
        <div class="drive-desc">${drive.desc}</div>
        <div class="weight-row">${weightsHTML}</div>
        <div class="drive-bottom">
          <span class="meta-txt">Deadline: ${fmtDeadline(drive.deadline)} · ${drive.applicants} applied</span>
          <a href="#" class="btn btn-primary btn-sm">Apply Now</a>
        </div>
      </div>`;
  }

  function orgPanelHTML(org) {
    const socialHTML = org.social.map(s =>
      `<a href="#" class="social-pill" aria-label="${s}">${socialIcons[s] || ''}</a>`
    ).join('');
    const drivesHTML = org.drives.length
      ? `<div class="drive-list">${org.drives.map(driveCardHTML).join('')}</div>`
      : `<div class="no-drives">No active recruitment drives right now. Check back soon.</div>`;

    return `
      <div class="org-panel-inner">
        <div class="org-detail-grid">
          <div class="org-about">
            <h4>About</h4>
            <p>${org.about}</p>
            <div class="org-social">${socialHTML}</div>
          </div>
          <div class="drives-col">
            <h4>Recruitment Drives (${org.drives.length})</h4>
            ${drivesHTML}
          </div>
        </div>
      </div>`;
  }

  function orgRowHTML(org) {
    const driveCount = org.drives.length;
    const countHTML = driveCount > 0
      ? `<span class="drive-count"><span class="pulse"></span>${driveCount} active drive${driveCount > 1 ? 's' : ''}</span>`
      : `<span class="drive-count none">No open drives</span>`;
    const tagsHTML = org.domains.map(d => `<span class="tag">${d}</span>`).join('');

    return `
      <div class="org-item" data-id="${org.id}" data-domains="${org.domains.join(',')}" data-has-drives="${driveCount > 0}">
        <div class="org-row" role="button" tabindex="0" aria-expanded="false">
          <div class="org-logo" style="background:${org.logoBg}">${org.short}</div>
          <div class="org-main">
            <div class="org-name-row">
              <span class="org-name">${org.name}</span>
            </div>
            <div class="org-tagline">${org.tagline}</div>
            <div class="org-tags">${tagsHTML}</div>
          </div>
          <div class="org-meta">${countHTML}</div>
          <div class="chevron"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div class="org-panel" id="panel-${org.id}">
          ${orgPanelHTML(org)}
        </div>
      </div>`;
  }

  /* ══ RENDER ══ */
  const orgListEl = document.getElementById('orgList');
  const emptyStateEl = document.getElementById('emptyState');

  function render() {
    orgListEl.innerHTML = orgs.map(orgRowHTML).join('');
    attachHandlers();
  }
  render();

  /* ══ ACCORDION (exclusive — opening one closes others) ══ */
  function attachHandlers() {
    document.querySelectorAll('.org-row').forEach(row => {
      row.addEventListener('click', () => toggleOrg(row));
      row.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleOrg(row); }
      });
    });
  }

  function toggleOrg(row) {
    const item = row.closest('.org-item');
    const panel = item.querySelector('.org-panel');
    const isOpen = item.classList.contains('open');

    // Close all others
    document.querySelectorAll('.org-item.open').forEach(other => {
      if (other !== item) {
        other.classList.remove('open');
        other.querySelector('.org-panel').style.maxHeight = '0px';
        other.querySelector('.org-row').setAttribute('aria-expanded', 'false');
      }
    });

    if (isOpen) {
      item.classList.remove('open');
      panel.style.maxHeight = '0px';
      row.setAttribute('aria-expanded', 'false');
    } else {
      item.classList.add('open');
      panel.style.maxHeight = panel.scrollHeight + 'px';
      row.setAttribute('aria-expanded', 'true');
      setTimeout(() => { item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 150);
    }
  }

  /* ══ SEARCH + FILTER ══ */
  const searchInput = document.getElementById('orgSearch');
  const chipRow = document.getElementById('chipRow');
  let activeFilter = 'all';

  function applyFilters() {
    const query = searchInput.value.trim().toLowerCase();
    let visibleCount = 0;

    document.querySelectorAll('.org-item').forEach(item => {
      const id = item.dataset.id;
      const org = orgs.find(o => o.id === id);
      const matchesText = org.name.toLowerCase().includes(query) || org.tagline.toLowerCase().includes(query);
      let matchesFilter = true;
      if (activeFilter === 'open') matchesFilter = item.dataset.hasDrives === 'true';
      else if (activeFilter !== 'all') matchesFilter = item.dataset.domains.includes(activeFilter);

      const visible = matchesText && matchesFilter;
      item.style.display = visible ? '' : 'none';
      if (visible) visibleCount++;
    });

    emptyStateEl.style.display = visibleCount === 0 ? 'block' : 'none';
  }

  searchInput.addEventListener('input', applyFilters);
  chipRow.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chipRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      applyFilters();
    });
  });
</script>
</body>
</html>
