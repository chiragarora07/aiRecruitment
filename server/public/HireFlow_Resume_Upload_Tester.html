<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireFlow Resume Upload Tester</title>
<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.card{
    width:420px;
    background:#1e293b;
    padding:24px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.35);
}
h2{margin-top:0}
label{display:block;margin:12px 0 6px}
input,button{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
}
input{
    background:#334155;
    color:#fff;
}
button{
    margin-top:18px;
    background:#2563eb;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
}
button:hover{background:#1d4ed8;}
pre{
    margin-top:18px;
    background:#020617;
    padding:12px;
    border-radius:8px;
    white-space:pre-wrap;
    max-height:250px;
    overflow:auto;
}
</style>
</head>
<body>

<div class="card">
<h2>HireFlow Resume Upload Tester</h2>

<label>Candidate ID</label>
<input id="candidateId" placeholder="Enter Candidate ID">

<label>Select Resume (PDF/DOC/DOCX)</label>
<input id="resume" type="file" accept=".pdf,.doc,.docx">

<button onclick="uploadResume()">Upload Resume</button>

<pre id="output">Waiting...</pre>

</div>

<script>
async function uploadResume(){

    const file=document.getElementById("resume").files[0];
    const candidateId=document.getElementById("candidateId").value.trim();

    if(!file){
        alert("Please select a resume.");
        return;
    }

    const formData=new FormData();
    formData.append("resume",file); // change key if backend expects another field
    if(candidateId){
      formData.append("applicationId",candidateId);
    }

    try{

        const response=await fetch("http://localhost:5000/api/resume/upload",{
            method:"POST",
            body:formData
            // If your route requires JWT:
            // headers:{
            //   Authorization:"Bearer YOUR_TOKEN"
            // }
        });

        const text=await response.text();

        try{
            document.getElementById("output").textContent=
                JSON.stringify(JSON.parse(text),null,2);
        }catch{
            document.getElementById("output").textContent=text;
        }

    }catch(err){
        document.getElementById("output").textContent=err.message;
    }

}
</script>

</body>
</html>
